<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>د. خالد غطاس — Dr. Khaled Ghattass</title>
<link rel="stylesheet" href="tokens.css">
<style>
/* ============================================================
   Site chrome, sections, motion, loaders.
   Forks the Qalem website UI kit; tightened for production.
   ============================================================ */

/* ---------- Top route loader (1px accent fill) ---------- */
.qh-routebar {
  position: fixed; top: 0; inset-inline: 0;
  height: 2px; background: transparent;
  z-index: 200; pointer-events: none;
}
.qh-routebar > i {
  display: block; height: 100%;
  background: var(--accent);
  width: 0%;
  transform-origin: var(--rb-origin, left);
  transition: width 900ms cubic-bezier(0.16, 1, 0.3, 1), opacity 400ms ease;
}
[dir="rtl"] .qh-routebar { --rb-origin: right; }
.qh-routebar.loading > i { width: 80%; }
.qh-routebar.done    > i { width: 100%; opacity: 0; }

/* ---------- Reveal-on-scroll ---------- */
.reveal {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 700ms cubic-bezier(0.16, 1, 0.3, 1),
              transform 700ms cubic-bezier(0.16, 1, 0.3, 1);
  will-change: opacity, transform;
}
.reveal.is-visible { opacity: 1; transform: none; }

/* ---------- Hero stagger ---------- */
.qh-hero .stagger { opacity: 0; transform: translateY(14px); }
.qh-hero.is-loaded .stagger {
  animation: heroIn 800ms cubic-bezier(0.16, 1, 0.3, 1) both;
}
.qh-hero.is-loaded .stagger.s1 { animation-delay: 80ms;  }
.qh-hero.is-loaded .stagger.s2 { animation-delay: 240ms; }
.qh-hero.is-loaded .stagger.s3 { animation-delay: 560ms; }
.qh-hero.is-loaded .stagger.s4 { animation-delay: 800ms; }
.qh-hero.is-loaded .stagger.s5 { animation-delay: 1040ms; }
.qh-hero.is-loaded .stagger.s6 { animation-delay: 1240ms; }
@keyframes heroIn {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: none; }
}

/* ---------- Skeleton shimmer ---------- */
.skel {
  background: linear-gradient(90deg,
    var(--bg-deep) 0%, var(--bg-elevated) 40%,
    var(--bg-deep) 80%);
  background-size: 200% 100%;
  animation: skelShimmer 1.4s linear infinite;
  border-radius: var(--radius-md);
}
@keyframes skelShimmer {
  from { background-position: 200% 0; }
  to   { background-position: -200% 0; }
}

/* play icon pulse */
.qh-iv-play, .qh-lecture-play { animation: playPulse 2.4s ease-in-out infinite; }
@keyframes playPulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.0); }
  50%     { box-shadow: 0 0 0 8px rgba(255,255,255,0.0); transform: translate(-50%,-50%) scale(1.04); }
}

/* form spinner */
.spinner {
  width: 14px; height: 14px;
  border: 2px solid var(--border-strong);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 700ms linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ---------- Mobile drawer ---------- */
.qh-burger {
  display: none;
  width: 36px; height: 36px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius-pill);
  align-items: center; justify-content: center;
  cursor: pointer; color: var(--fg1);
}
.qh-burger:hover { border-color: var(--border-strong); }
@media (max-width: 720px) { .qh-burger { display: inline-flex; } }
.qh-drawer {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 100;
  display: flex; flex-direction: column;
  padding: 24px clamp(24px, 6vw, 56px);
  transform: translateY(-100%);
  transition: transform 360ms cubic-bezier(0.16, 1, 0.3, 1);
  overflow-y: auto;
}
.qh-drawer.open { transform: translateY(0); }
.qh-drawer-top {
  display: flex; align-items: center; justify-content: space-between;
  padding-bottom: 32px; border-bottom: 1px solid var(--border);
}
.qh-drawer-nav {
  display: flex; flex-direction: column;
  gap: 4px;
  padding-block: 32px;
  flex: 1;
}
.qh-drawer-nav a {
  font-family: var(--font-arabic-display);
  font-size: 28px; font-weight: 700; line-height: 1.4;
  color: var(--fg1);
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.qh-drawer-nav a:hover { color: var(--accent); }
[dir="ltr"] .qh-drawer-nav a { font-family: var(--font-latin); letter-spacing: -0.02em; }
.qh-drawer-foot {
  display: flex; gap: 8px; align-items: center;
  padding-top: 16px;
}

/* ---------- Hero — keep portrait but make it more prominent than the kit's medallion ---------- */
.qh-hero { position: relative; }

/* Honor reduced motion */
@media (prefers-reduced-motion: reduce) {
  .reveal { opacity: 1 !important; transform: none !important; transition: none !important; }
  .qh-hero .stagger { opacity: 1 !important; transform: none !important; animation: none !important; }
  .qh-iv-play, .qh-lecture-play, .spinner, .skel { animation: none !important; }
  * { transition-duration: 0.001ms !important; }
}
</style>

<!-- Pin the homepage CSS from the design system and a couple of small adjustments -->
<style id="qh-styles">
/* Pulled from the Qalem website UI kit, with minor adjustments. Inlined to avoid path issues. */
.qh-home { background: var(--bg); color: var(--fg1); min-height: 100vh; }

/* CHROME */
.qh-chrome { position: sticky; top: 0; z-index: 50; background: color-mix(in srgb, var(--bg) 92%, transparent); backdrop-filter: saturate(120%) blur(14px); border-bottom: 1px solid var(--border); }
.qh-chrome-inner { max-width: var(--container-max); margin-inline: auto; padding: 14px clamp(20px, 5vw, 56px); display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 24px; }
.qh-mark { display: inline-flex; align-items: center; gap: 10px; font-family: var(--font-arabic-display); font-weight: 700; font-size: 15px; color: var(--fg1); }
[dir="ltr"] .qh-mark { font-family: var(--font-latin); letter-spacing: -0.01em; }
.qh-mark img { height: 22px; width: auto; }
[data-theme="dark"] .qh-mark img { filter: invert(1); }
.qh-mark-name { white-space: nowrap; }
.qh-nav { justify-self: center; display: flex; gap: clamp(16px, 2.4vw, 32px); }
.qh-nav a { font-size: 13.5px; color: var(--fg2); font-weight: 500; }
.qh-nav a:hover { color: var(--fg1); }
.qh-chrome-end { display: flex; gap: 6px; align-items: center; }
.qh-toggle { width: 36px; height: 32px; background: transparent; border: 1px solid var(--border); border-radius: var(--radius-pill); font-family: var(--font-latin); font-size: 11px; font-weight: 600; letter-spacing: 0.04em; color: var(--fg2); cursor: pointer; transition: all var(--dur-fast) var(--ease-out); }
.qh-toggle:hover { color: var(--fg1); border-color: var(--border-strong); }
.qh-icon { width: 32px; height: 32px; background: transparent; border: 1px solid var(--border); border-radius: var(--radius-pill); display: inline-flex; align-items: center; justify-content: center; color: var(--fg2); cursor: pointer; }
.qh-icon:hover { color: var(--fg1); border-color: var(--border-strong); }
.qh-avatar { width: 32px; height: 32px; border-radius: 9999px; background: var(--fg1); color: var(--bg); display: inline-flex; align-items: center; justify-content: center; font-family: var(--font-latin); font-weight: 700; font-size: 13px; cursor: pointer; }
@media (max-width: 720px) { .qh-nav { display: none; } .qh-chrome-inner { grid-template-columns: 1fr auto; } .qh-chrome-end .qh-icon, .qh-chrome-end .qh-avatar { display: none; } }

/* Section labels */
.qh-section-label { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-latin); font-size: 11px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg3); }
[dir="rtl"] .qh-section-label { font-family: var(--font-arabic-body); letter-spacing: 0; text-transform: none; font-weight: 700; font-size: 13px; }
.qh-section-label::before { content: ""; width: 24px; height: 1px; background: var(--border-strong); display: inline-block; }
.qh-section-title { font-family: var(--font-arabic-display); font-size: clamp(32px, 4.5vw, 52px); line-height: 1.05; font-weight: 700; letter-spacing: -0.01em; color: var(--fg1); margin-top: 14px; }
[dir="ltr"] .qh-section-title { font-family: var(--font-latin); letter-spacing: -0.025em; }
.qh-section-sub { font-size: 17px; line-height: 1.6; color: var(--fg2); margin-top: 12px; max-width: 560px; }

.qh-store-head { display: grid; grid-template-columns: 1fr auto; align-items: end; gap: 24px; padding-bottom: 56px; }
.qh-store-allbtn { font-family: var(--font-latin); font-size: 13px; font-weight: 600; color: var(--fg2); display: inline-flex; align-items: center; gap: 6px; align-self: end; padding-bottom: 6px; }
[dir="rtl"] .qh-store-allbtn { font-family: var(--font-arabic-body); font-size: 14px; }
.qh-store-allbtn:hover { color: var(--accent); }
@media (max-width: 720px) { .qh-store-head { grid-template-columns: 1fr; align-items: start; padding-bottom: 32px; } }

/* ==========================================================
   HERO — Option A: Editorial split, full-bleed portrait
   ========================================================== */
.qh-hero {
  display: grid;
  grid-template-columns: 1fr 1fr;
  min-height: calc(100vh - 57px);
  border-bottom: 1px solid var(--border);
  overflow: hidden;
  position: relative;
}

/* Portrait panel — full-bleed, no padding */
.qh-hero-photo {
  position: relative;
  overflow: hidden;
  background: var(--bg-deep);
}
/* RTL: portrait on left (order 1), content on right (order 2) */
[dir="rtl"] .qh-hero-photo { order: 1; }
[dir="rtl"] .qh-hero-content { order: 2; }
/* LTR: content on left (order 1), portrait on right (order 2) */
[dir="ltr"] .qh-hero-photo { order: 2; }
[dir="ltr"] .qh-hero-content { order: 1; }

.qh-hero-photo img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center 22%;
  display: block;
  filter: saturate(0.78) contrast(1.05);
  transition: filter var(--dur-slow) var(--ease-out);
}
[data-theme="dark"] .qh-hero-photo img { filter: saturate(0.62) contrast(1.08) brightness(0.88); }
/* Editorial vignette + warm wash */
.qh-hero-photo::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 50% 28%, transparent 38%, rgba(20,15,10,0.22) 100%),
    linear-gradient(180deg, transparent 55%, rgba(20,15,10,0.40) 100%);
  pointer-events: none;
  z-index: 1;
}

/* Hairline divider */
.qh-hero-photo::before {
  content: "";
  position: absolute;
  inset-block: 0;
  inset-inline-end: 0;
  width: 1px;
  background: var(--border);
  z-index: 2;
}
[dir="ltr"] .qh-hero-photo::before { inset-inline-start: 0; inset-inline-end: auto; }

/* Content panel */
.qh-hero-content {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: clamp(48px, 6vw, 96px) clamp(32px, 5vw, 72px);
  gap: 0;
}

/* Eyebrow */
.qh-hero-kicker {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-latin);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--fg3);
  margin-bottom: 28px;
}
[dir="rtl"] .qh-hero-kicker { font-family: var(--font-arabic-body); letter-spacing: 0.04em; text-transform: none; font-weight: 700; font-size: 12.5px; }
.qh-tick { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; display: inline-block; flex-shrink: 0; }

/* Name — large, tight, stacked */
.qh-hero-name {
  font-family: var(--font-arabic-display);
  font-weight: 800;
  font-size: clamp(52px, 7.5vw, 112px);
  line-height: 0.9;
  letter-spacing: -0.03em;
  color: var(--fg1);
  margin: 0 0 28px;
  display: block;
}
[dir="ltr"] .qh-hero-name { font-family: var(--font-latin); letter-spacing: -0.04em; }
.qh-hero-name-accent { color: var(--accent); }

/* Accent rule */
.qh-hero-rule {
  width: 48px;
  height: 3px;
  background: var(--accent);
  border: 0;
  margin: 0 0 28px;
  display: block;
}

/* Statement */
.qh-hero-statement {
  font-family: var(--font-arabic-body);
  font-size: clamp(15px, 1.6vw, 18px);
  line-height: 1.75;
  color: var(--fg2);
  font-weight: 400;
  margin: 0 0 40px;

}
[dir="ltr"] .qh-hero-statement { font-family: var(--font-latin); }

/* Stats trust band */
.qh-hero-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);

.qh-hero-stat-num {
  font-family: var(--font-arabic-display);
  font-weight: 800;

/* CTAs */

/* Est stamp on photo */
.qh-hero-est {

  inset-block-end: 20px;
  inset-inline-start: 20px;
  z-index: 3;
  font-family: var(--font-latin);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.75);
}
[dir="rtl"] .qh-hero-est { font-family: var(--font-arabic-body); letter-spacing: 0; text-transform: none; font-size: 11px; }

/* Mobile */
@media (max-width: 800px) {
  .qh-hero {
    grid-template-columns: 1fr;
    min-height: auto;
  }
  .qh-hero-photo { order: 1 !important; aspect-ratio: 4/3; position: relative; min-height: unset; }
  .qh-hero-content { order: 2 !important; padding: 36px 24px 48px; }
  .qh-hero-photo::before { display: none; }
  .qh-hero-name { font-size: clamp(48px, 12vw, 72px); margin-bottom: 20px; }
  .qh-hero-stats { grid-template-columns: repeat(2, 1fr); }

.qh-about-venues, .qh-about-outlets-ul { display: flex; flex-wrap: wrap; gap: 6px 22px; list-style: none; margin: 0; padding: 0; }

@media (max-width: 720px) { .qh-about-row, [dir="rtl"] .qh-about-row { grid-template-columns: 1fr; gap: 8px; } }

.qh-about-stat dd { margin: 12px 0 0; font-size: 13px; color: var(--fg3); letter-spacing: 0.02em; }

.qh-about-link { font-family: var(--font-latin); font-size: 14px; font-weight: 600; color: var(--fg1); display: inline-flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--fg1); padding-bottom: 2px; }
[dir="rtl"] .qh-about-link { font-family: var(--font-arabic-body); }
.qh-about-link:hover { color: var(--accent); border-color: var(--accent); }

/* STORE */
.qh-store { padding: clamp(80px, 10vw, 140px) clamp(20px, 5vw, 56px); border-bottom: 1px solid var(--border); background: var(--bg); }
.qh-store-inner { max-width: var(--container-max); margin-inline: auto; }

[dir="rtl"] .qh-store-kicker { font-family: var(--font-arabic-body); letter-spacing: 0; text-transform: none; font-weight: 700; font-size: 13px; }

.qh-store-hero-cover { aspect-ratio: 4/5; background: var(--bg-deep); border-radius: 4px; overflow: hidden; box-shadow: var(--shadow-lift); position: relative; }
.qh-store-hero-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
.qh-store-hero-meta { display: flex; flex-direction: column; gap: 14px; }
.qh-store-hero-meta h3 { font-family: var(--font-arabic-display); font-size: clamp(28px, 3.5vw, 44px); line-height: 1.05; font-weight: 700; letter-spacing: -0.01em; color: var(--fg1); }
[dir="ltr"] .qh-store-hero-meta h3 { font-family: var(--font-latin); letter-spacing: -0.02em; }
.qh-store-hero-meta p { font-size: 17px; line-height: 1.6; color: var(--fg2); margin: 0; }
.qh-store-hero-buy { display: flex; align-items: center; gap: 20px; margin-top: 8px; flex-wrap: wrap; }
.qh-price { font-family: var(--font-latin); font-size: 24px; font-weight: 600; color: var(--fg1); font-feature-settings: "tnum"; }
.qh-price span { font-size: 11px; font-weight: 500; letter-spacing: 0.12em; color: var(--fg3); margin-inline-start: 6px; }
.qh-store-shelf-section { display: flex; flex-direction: column; gap: 28px; min-width: 0; }
.qh-store-shelf { display: flex; flex-direction: column; gap: 16px; min-width: 0; }
.qh-shelf-cover { aspect-ratio: 2/3; background: var(--bg-deep); border-radius: 2px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.qh-shelf-cover img { width: 100%; height: 100%; object-fit: cover; }
.qh-store-shelf-head { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; }

const { useState, useEffect, useRef, useMemo } = React;

/* ============================================================
   Reveal-on-scroll wrapper
   ============================================================ */
function Reveal({ children, delay = 0, className = '', as: Tag = 'div', ...rest }) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setTimeout(() => el.classList.add('is-visible'), delay); io.disconnect(); }
    }, { threshold: 0.15 });
    io.observe(el);
    return () => io.disconnect();
  }, [delay]);
  return <Tag ref={ref} className={`reveal ${className}`} {...rest}>{children}</Tag>;
}

/* ============================================================
   Stat count-up
   ============================================================ */
function CountUp({ to, prefix = '', suffix = '', duration = 1400, locale = 'ar' }) {
  const [v, setV] = useState(0);
  const ref = useRef(null);
  const started = useRef(false);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting && !started.current) {
        started.current = true;
        const start = performance.now();
        const tick = (now) => {
          const t = Math.min(1, (now - start) / duration);
          // ease-out-expo
          const eased = t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
          setV(Math.round(to * eased));
          if (t < 1) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
      }
    }, { threshold: 0.4 });
    io.observe(el);
    return () => io.disconnect();
  }, [to, duration]);
  const display = locale === 'ar'
    ? v.toLocaleString('ar-EG')
    : v.toLocaleString('en-US');
  return <span ref={ref}>{prefix}{display}{suffix}</span>;
}

        priv: "I will never share your address. Unsubscribe any time.",

    setState('submitting');
    setTimeout(() => setState('done'), 900);
  };

      <div className="qh-news-inner">
        <Reveal>
          <p className="qh-news-statement">{t.statement}</p>
          <p className="qh-news-sign">{t.sign}</p>
          {state === 'done' ? (
            <p className="qh-news-success">{t.success}</p>
          ) : (
            <form className="qh-news-form" onSubmit={submit}>
              <input type="email" className="qh-news-input" placeholder={t.placeholder}
                     value={email} onChange={(e) => setEmail(e.target.value)} required aria-label={t.placeholder}/>
              <button type="submit" className="qh-news-cta" disabled={state === 'submitting'}>
                {state === 'submitting' ? <span className="spinner" aria-hidden="true"></span> : <>{t.cta} <span aria-hidden="true">{isRtl ? '←' : '→'}</span></>}

            <div className="qh-field"><label className="qh-label">{t.confirm}</label><input className="qh-input" type="password" required minLength={6} /></div>
            <button className="qh-form-submit" type="submit" style={{ width: 'auto', padding: '12px 28px', alignSelf: 'flex-start' }}>{t.updatePwd}</button>
          </form>
        </div>
        {/* Language */}
        <div className="qh-settings-group">
          <h3>{t.lang}</h3>
          <p className="qh-settings-desc">{t.langDesc}</p>
          <div className="qh-segment" role="tablist">
            <button className={locale === 'ar' ? 'is-active' : ''} onClick={() => setLocale('ar')}>العربية</button>
            <button className={locale === 'en' ? 'is-active' : ''} onClick={() => setLocale('en')}>English</button>
          </div>
        </div>
        {/* Theme */}
        <div className="qh-settings-group">
          <h3>{t.themeT}</h3>
          <p className="qh-settings-desc">{t.themeDesc}</p>
          <div className="qh-theme-radio" role="radiogroup" aria-label={t.themeT}>
            <button className={`qh-theme-card ${theme === 'light' ? 'is-active' : ''}`} onClick={() => setTheme('light')} role="radio" aria-checked={theme === 'light'}>
              <div className="qh-theme-preview qh-theme-preview-light" aria-hidden="true">
                <span className="qh-theme-preview-bar" />
                <span className="qh-theme-preview-line" />
                <span className="qh-theme-preview-line short" />
              </div>
              <div className="qh-theme-card-meta">
                <strong>{t.light}</strong>
                <span>{t.lightDesc}</span>
              </div>
              <span className="qh-theme-card-mark" aria-hidden="true">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              </span>
            </button>
            <button className={`qh-theme-card ${theme === 'dark' ? 'is-active' : ''}`} onClick={() => setTheme('dark')} role="radio" aria-checked={theme === 'dark'}>
              <div className="qh-theme-preview qh-theme-preview-dark" aria-hidden="true">
                <span className="qh-theme-preview-bar" />
                <span className="qh-theme-preview-line" />
                <span className="qh-theme-preview-line short" />
              </div>
              <div className="qh-theme-card-meta">
                <strong>{t.dark}</strong>
                <span>{t.darkDesc}</span>
              </div>
              <span className="qh-theme-card-mark" aria-hidden="true">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              </span>
            </button>
          </div>
        </div>
        {/* Notifications */}
        <div className="qh-settings-group">
          <h3>{t.notif}</h3>
          <p className="qh-settings-desc">{t.notifDesc}</p>
          <div>
            <div className="qh-toggle-row">
              <div className="qh-toggle-row-label"><strong>{t.email}</strong><span>{t.emailDesc}</span></div>
              <button className={`qh-switch ${prefs.email ? 'is-on' : ''}`} onClick={() => setPrefs({ ...prefs, email: !prefs.email })} aria-pressed={prefs.email}/>
            </div>
            <div className="qh-toggle-row">
              <div className="qh-toggle-row-label"><strong>{t.newsletter}</strong><span>{t.newsDesc}</span></div>
              <button className={`qh-switch ${prefs.newsletter ? 'is-on' : ''}`} onClick={() => setPrefs({ ...prefs, newsletter: !prefs.newsletter })} aria-pressed={prefs.newsletter}/>
            </div>
            <div className="qh-toggle-row">
              <div className="qh-toggle-row-label"><strong>{t.updates}</strong><span>{t.updDesc}</span></div>
              <button className={`qh-switch ${prefs.updates ? 'is-on' : ''}`} onClick={() => setPrefs({ ...prefs, updates: !prefs.updates })} aria-pressed={prefs.updates}/>
            </div>
          </div>
        </div>
        {/* Logout */}
        <div className="qh-logout-zone">
          <button className="qh-logout-btn" onClick={logout}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            {t.logout}
          </button>
        </div>
      </div>
    </section>
  );
}

function AccountPage({ locale, setLocale, theme, setTheme, user, updateUser, navigate, logout, accountTab, setAccountTab, prefs, setPrefs, toast }) {
  const isRtl = locale === 'ar';
  const initial = (user.name || 'U').trim().charAt(0).toUpperCase();
  const since = user.since || (isRtl ? 'عضو منذ ٢٠٢٤' : 'Member since 2024');
  const tabs = isRtl
    ? [['profile', 'الملف الشخصي'], ['purchases', 'مشترياتي'], ['settings', 'الإعدادات']]
    : [['profile', 'Profile'], ['purchases', 'My purchases'], ['settings', 'Settings']];
  return (
    <section className="qh-account">
      <div className="qh-account-inner">
        <div className="qh-account-head">
          <span className="qh-account-avatar">{initial}</span>
          <div className="qh-account-id">
            <h1>{user.name}</h1>
            <p>{user.email}</p>
          </div>
          <span className="qh-account-since">{since}</span>
        </div>
        <div className="qh-account-tabs" role="tablist">
          {tabs.map(([id, label]) => (
            <button key={id} className={`qh-account-tab ${accountTab === id ? 'is-active' : ''}`} onClick={() => setAccountTab(id)}>{label}</button>
          ))}
        </div>
        {accountTab === 'profile' && <AccountProfile locale={locale} user={user} updateUser={updateUser} toast={toast} />}
        {accountTab === 'purchases' && <AccountPurchases locale={locale} />}
        {accountTab === 'settings' && <AccountSettings locale={locale} setLocale={setLocale} theme={theme} setTheme={setTheme} prefs={prefs} setPrefs={setPrefs} toast={toast} logout={logout} />}
      </div>
    </section>
  );
}

/* ============================================================
   APP — orchestrates locale, theme, route loader, drawer
   ============================================================ */
function App() {
  const [locale, setLocale] = useState('ar');
  const [theme, setTheme] = useState('light');
  const [drawer, setDrawer] = useState(false);
  const [routeState, setRouteState] = useState('done'); // idle | loading | done
  const [heroLoaded, setHeroLoaded] = useState(false);
  const [route, setRoute] = useState('home'); // home | login | signup | account
  const [accountTab, setAccountTab] = useState('profile');
  const [user, setUser] = useState(null); // null = logged out
  const [toastMsg, setToastMsg] = useState(null);
  const [prefs, setPrefs] = useState({ email: true, newsletter: true, updates: false });
  const isRtl = locale === 'ar';

  const navigate = (r, tab) => {
    setRoute(r);
    if (r === 'account' && tab) setAccountTab(tab);
    setRouteState('loading');
    setTimeout(() => setRouteState('done'), 600);
    requestAnimationFrame(() => window.scrollTo({ top: 0, behavior: 'instant' in window ? 'instant' : 'auto' }));
  };
  const login = (u) => setUser({ ...u, since: isRtl ? 'عضو منذ ٢٠٢٤' : 'Member since 2024' });
  const logout = () => { setUser(null); navigate('home'); showToast(isRtl ? 'تم تسجيل الخروج.' : 'Signed out.'); };
  const updateUser = (patch) => setUser(u => ({ ...u, ...patch }));
  const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(null), 2400); };

  // Apply locale + theme to <html>
  useEffect(() => {
    document.documentElement.lang = locale;
    document.documentElement.dir = isRtl ? 'rtl' : 'ltr';
    document.documentElement.dataset.theme = theme;
  }, [locale, theme, isRtl]);

  // Trigger route bar on mount + on locale change
  useEffect(() => {
    setRouteState('loading');
    const t1 = setTimeout(() => setRouteState('done'), 800);
    return () => clearTimeout(t1);
  }, [locale]);

  // Hero entrance after first paint
  useEffect(() => {
    const t = setTimeout(() => setHeroLoaded(true), 60);
    return () => clearTimeout(t);
  }, []);

  // Lock scroll when drawer is open
  useEffect(() => {
    document.body.style.overflow = drawer ? 'hidden' : '';
  }, [drawer]);

  return (
    <div className="qh-home">
      <div className={`qh-routebar ${routeState === 'loading' ? 'loading' : 'done'}`}><i></i></div>
      <HomeChrome
        locale={locale} setLocale={setLocale}
        theme={theme} setTheme={setTheme}
        drawerOpen={drawer} setDrawerOpen={setDrawer}
        user={user} navigate={navigate} logout={logout}
      />
      <MobileDrawer
        open={drawer} onClose={() => setDrawer(false)}
        locale={locale} setLocale={setLocale}
        theme={theme} setTheme={setTheme}
        user={user} navigate={navigate} logout={logout}
      />
      <main>
        {route === 'home' && (
          <>
            <HomeHero locale={locale} loaded={heroLoaded} />
            <HomeAbout locale={locale} />
            <HomeStore locale={locale} />
            <HomeArticles locale={locale} />
            <HomeInterview locale={locale} />
            <HomeNewsletter locale={locale} />
          </>
        )}
        {route === 'login' && <LoginPage locale={locale} navigate={navigate} login={login} />}
        {route === 'signup' && <SignupPage locale={locale} navigate={navigate} login={login} />}
        {route === 'account' && user && (
          <AccountPage
            locale={locale} setLocale={setLocale}
            theme={theme} setTheme={setTheme}
            user={user} updateUser={updateUser}
            navigate={navigate} logout={logout}
            accountTab={accountTab} setAccountTab={setAccountTab}
            prefs={prefs} setPrefs={setPrefs}
            toast={showToast}
          />
        )}
        {route === 'account' && !user && <LoginPage locale={locale} navigate={navigate} login={login} />}
      </main>
      {route === 'home' && <HomeFooter locale={locale} />}
      {toastMsg && <div className="qh-toast">{toastMsg}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
